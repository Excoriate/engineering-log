  # Kafka

  ## General
  Kafka:ApplicationId: https://${keyVaultName}.vault.azure.net/secrets/esp-applicationId
  Kafka:SchemaRegistryUrl: "https://schemas.dtaaz.esp.eneco.com"
  Kafka:Tenant: "eneco"
  Kafka:UseSSL: "true"
  Kafka:Environment: "dev"

  ### Axual Kafka
  Kafka:ApplicationVersion: "1"
  Kafka:CALocation: "certs/ca-cert.pem"
  Kafka:CertificateLocation: "certs/client-cert.pem"
  Kafka:DiscoveryEndpointUrl: "https://discovery.dtaaz.esp.eneco.com"
  Kafka:KeystoreLocation: "certs/ssl-key.pfx"
  Kafka:Certificates:CACertificate: https://${keyVaultName}.vault.azure.net/secrets/kafka-dev-caCertificate
  Kafka:Certificates:ClientCertificate: https://${keyVaultName}.vault.azure.net/secrets/kafka-dev-clientCertificate
  Kafka:Certificates:SslKeyCertificate: https://${keyVaultName}.vault.azure.net/secrets/kafka-dev-sslKeyCertificate
  Kafka:Certificates:SslKeyPassword: "https://${keyVaultName}.vault.azure.net/secrets/kafka-dev-sslKeyPassword"

  #### Confluent Kafka
  Kafka:BootstrapServers: "bootstrap.dtaaz.esp.eneco.com:9094"
  Kafka:Instance: "dta"
  Kafka:EnableErrorHandler: "true"
  Kafka:EnableLogHandler: "false"
  Kafka:EnableFullyQualifiedNamingForTopic: "true"
  Kafka:SslCaCertificatePem: https://${keyVaultName}.vault.azure.net/secrets/kafka-dev-ssl-ca-certificate-pem
  Kafka:SslClientCertificatePem: https://${keyVaultName}.vault.azure.net/secrets/kafka-dev-ssl-client-certificate-pem
  Kafka:SslKeyPem: https://${keyVaultName}.vault.azure.net/secrets/kafka-dev-ssl-key-pem
  Kafka:SslKeyPassword: "https://${keyVaultName}.vault.azure.net/secrets/kafka-dev-ssl-key-password"

  # Kafka topics
  Kafka:Topics:OperatorAlarmAndLogEvents_v1: "coo-vpp-operator-alarmandlogevents-1"

