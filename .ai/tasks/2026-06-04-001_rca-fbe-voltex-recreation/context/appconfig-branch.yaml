Shared:
  # Azure AD
  AzureAdAuthentication:Instance: "https://login.microsoftonline.com/"

  # Swagger
  SwaggerOptions:Enabled: "true"

  # Swagger Azure AD
  SwaggerOptions:AzureAd:Enabled: "true"
  SwaggerOptions:AzureAd:Instance: "https://login.microsoftonline.com/"
  SwaggerOptions:AzureAd:Scopes:0: "api://ea5f10d6-8534-4638-8a47-0c7025fc8807/api_access"
  SwaggerOptions:AzureAd:TenantId: https://${keyVaultName}.vault.azure.net/secrets/AzureAdAuthentication-TenantId
  SwaggerOptions:AzureAd:ClientId: https://${keyVaultName}.vault.azure.net/secrets/aad-auth-clientid-swagger

  # Application Insights
  ApplicationInsights:ConnectionString: https://${keyVaultName}.vault.azure.net/secrets/connectionstrings-application-insights

  # Eventual Consistency
  EventualConsistencyCosmosDbOptions:ConnectionString: https://${keyVaultName}.vault.azure.net/secrets/connectionstrings-cosmosdbmongo-account-generic

  # Open Telemetry Metrics
  OpenTelemetryOptions:CollectorEndpoint: "http://opentelemetry-collector-collector.${environment}-monitoring.svc.cluster.local:4317"

  # Seeding Api Key
  SeedingApiKey: https://${keyVaultName}.vault.azure.net/secrets/seeding-api-key

  # Leader Election
  LeaderElection:LeaseDurationInSeconds: "15"
  LeaderElection:LeaseRenewDeadlineInSeconds: "10"
  LeaderElection:LeaseRetryPeriodInSeconds: "2"

  # Scala gateway
  ScalaGatewayClientOptions:DatabaseName: "vpp-cosmosdb-d"
  ScalaGatewayClientOptions:UseGatewayMode: "true"
  ScalaGatewayClientOptions:ConnectionString: https://${keyVaultName}.vault.azure.net/secrets/scala-gateway-connection-string

  # Serilog
  Serilog:MinimumLevel:Default: "Information"
  Serilog:MinimumLevel:Override:Microsoft.AspNetCore: "Warning"
  Serilog:MinimumLevel:Override:Microsoft.EntityFrameworkCore: "Warning"
  Serilog:MinimumLevel:Override:Microsoft.IdentityModel: "Error"
  Serilog:MinimumLevel:Override:System: "Warning"

